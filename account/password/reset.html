<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QChat</title>

	<style>
:root {
	--u: 1.8vw;

	--c: #30f;
	--c2: #90f;

	--l41: #02d;
	--l42: #0cf;

	--l31: #050;
	--l32: #8f8;

	--l21: #f80;
	--l22: #ff0;

	--action: #205;
	--action2: #2a006c;
	--action3: #30a;

	--grey: #555;
	--grey-s: #5557;

	--bg: #000;
	--shadow: #0007;

	--text: #fff;
	--text-s: #fff5;
	--text2: #ccc;

	--fg: #141415;
	--fg2: #1f1f20;
	--fg3: #252526;

	--border: #333;
	--border2: #555;


	--border-width: calc(.12 * var(--u));
	--br: calc(1 * var(--u));
	--chat-margin: calc(1 * var(--u));
}
body {
	margin: 0;
	background: var(--bg);
	overflow: hidden;
}
* {
	scrollbar-width: none;
}
*::-webkit-scrollbar {
	display: none;
}
.btn {
	--btn-h: var(--h);
	--btn-s: var(--s);
	--btn-l: var(--l);
	--border: calc(.15 * var(--u));

	box-sizing: border-box;
	font-family: monospace;
	font-size: calc(2 * var(--u));
	color: var(--text);

	background: hsl(var(--btn-h), calc(83% * var(--btn-s)), calc(57% * var(--btn-l)));
	border: var(--border) solid hsl(var(--btn-h), calc(70% * var(--btn-s)), calc(48% * var(--btn-l)));
	border-radius: var(--br);
	box-shadow:
		0 calc(var(--border)/2) calc(var(--border)/2) var(--border) hsla(var(--btn-h), calc(72% * var(--btn-s)), calc(30% * var(--btn-l)), 0.2),
		inset 0 calc(-1 * var(--border)) var(--border) 0 hsl(var(--btn-h), calc(70% * var(--btn-s)), calc(48% * var(--btn-l))),
		inset 0 0 0 var(--border) hsl(var(--btn-h), calc(92% * var(--btn-s)), calc(62% * var(--btn-l)));

	transition: .2s;
}
.btn:hover {
	--btn-l: calc(var(--l) * 1.05);
}
.btn:focus {
	outline: none;
}
.btn::selection {
	background: var(--c);
}
#top {
	position: absolute;
	top: 0;
	left: 0;
	height: calc(5 * var(--u));
	display: flex;
	align-items: center;
	width: calc(100vw - var(--chat-margin) - calc(2 * var(--u)));
	margin: 0 calc(2 * var(--u)) 0 var(--chat-margin);
	gap: var(--chat-margin);
}
#top button {
	position: relative;
	background: transparent;
	border: none;
	width: calc(2.5 * var(--u));
	height: calc(2.5 * var(--u));
}
#top button:focus {
	outline: none;
}
#top button svg {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: calc(3 * var(--u));
	height: calc(3 * var(--u));
	stroke: var(--text);
}
#top .right {
	margin-left: auto;
	display: flex;
	align-items: center;
	gap: calc(1.2 * var(--chat-margin));
}
#top #channel {
	user-select: none;
	margin: 0;
	font-family: monospace;
	font-size: calc(2.5 * var(--u));
	color: var(--grey);
}
.logo {
	user-select: none;
	margin: 0;
	font-family: monospace;
	color: var(--text);
	font-size: calc(2.5 * var(--u));
}
.logo b {
	font-weight: 700;
}
#info {
	position: absolute;
	bottom: calc(1 * var(--u));
	width: calc(100vw - (1.2 * var(--u)) * 2);
	margin: 0 calc(1.2 * var(--u));
	display: flex;
	justify-content: space-between;
	align-items: center;
}
#info p {
	margin: 0;
	height: calc(2 * var(--u));
	font-family: monospace;
	font-size: calc(1.5 * var(--u));
	color: var(--grey);
}
#info p::selection {
	background: var(--grey-s);
}





#menu-wrapper {
	pointer-events: none;
	position: absolute;
	top: 0;
	left: -100vw;
	width: 100vw;
	height: 100vh;
	z-index: 50;
	display: grid;
	grid-template-columns: auto calc(5 * var(--u));
	transition: .5s;

	#menu {
		width: 100%;
		height: 100%;
		background: var(--bg);
		box-shadow: 0 0 calc(5 * var(--u)) 0 var(--bg);
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: calc(5 * var(--u));
	
		.logo {
			font-size: calc(3 * var(--u));
			margin-top: calc(5 * var(--u));
			text-align: center;
		}
		div {
			width: 100%;
			height: max-content;
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: calc(1 * var(--u));
		}
		div[hidden] {
			display: none;
		}
		input[type="text"], input[type="password"], button {
			width: 50%;
			height: calc(5 * var(--u));
			box-sizing: border-box;
			font-family: monospace;
			font-size: calc(2 * var(--u));
		
			&:focus {
				outline: none;
				border-color: var(--c);
			}
			&::selection {
				background: var(--c);
			}
		}
		input[type="text"], input[type="password"] {
			background: var(--fg);
			border: var(--border-width) solid var(--border);
			border-radius: var(--br);
			font-family: monospace;
			font-size: calc(2 * var(--u));
			padding-left: calc(1.25 * var(--u));
			color: var(--text);
		}
		button {
			background: var(--fg2);
			border: var(--border-width) solid var(--border2);
			border-radius: var(--br);
			color: var(--text);
		
			&:hover {
				background: var(--fg3);
			}
		}
		h1, h2, p:not(.logo) {
			width: 50%;
			box-sizing: border-box;
			font-family: monospace;
			font-size: calc(2 * var(--u));
			margin: 0;
			text-align: center;
			color: var(--text);

			&::selection {
				background: var(--text-s);
			}
		}
		
		p:not(.logo) {
			font-size: calc(1.5 * var(--u));
		}
		#logout-section h2 {
			margin: calc(1 * var(--u)) 0 calc(1.25 * var(--u)) 0;
		}
	}
	#close-menu {
		position: relative;
		width: calc(5 * var(--u));
		height: calc(5 * var(--u));
		background: var(--bg);
		border: none;

		&:focus {
			outline: none;
		}
		svg {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: calc(2.5 * var(--u));
			height: calc(2.5 * var(--u));
			stroke: var(--text);
		}
	}
	&[data-active="1"] {
		left: 0;
		pointer-events: auto;
	}
}








#main {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);

	width: calc(30 * var(--u));

	display: flex;
	flex-direction: column;
	gap: calc(.5 * var(--u));

	input[type="text"], input[type="password"], button {
		width: 100%;
		height: calc(5 * var(--u));
		box-sizing: border-box;
		font-family: monospace;
		font-size: calc(2 * var(--u));
	
		&:focus {
			outline: none;
			border-color: var(--c);
		}
		&::selection {
			background: var(--c);
		}
	}
	input.invalid {
		border-color: red !important;
	}
	input[type="password"] {
		background: var(--fg);
		border: var(--border-width) solid var(--border);
		border-radius: var(--br);
		font-family: monospace;
		font-size: calc(2 * var(--u));
		padding-left: calc(1.25 * var(--u));
		color: var(--text);
	}
	button {
		background: var(--fg2);
		border: var(--border-width) solid var(--border2);
		border-radius: var(--br);
		color: var(--text);
		margin-top: calc(4 * var(--u));
	
		&:hover {
			background: var(--fg3);
		}
	}

	h1, h2 {
		width: 100%;
		box-sizing: border-box;
		font-family: Arial;
		margin: 0;
		font-weight: 500;
		color: var(--text);
		&::selection {
			background: var(--text-s);
		}
	}
	h1 {
		font-size: calc(3 * var(--u));
		text-align: center;
	}
	h2 {
		margin-top: calc(2 * var(--u));
		font-size: calc(1.5 * var(--u));
	}
}
.lvl5 {
	background: linear-gradient(to bottom, var(--c) 20%, var(--c2));
}
.lvl4 {
	background: linear-gradient(to bottom, var(--l41) 20%, var(--l42));
}
.lvl3 {
	background: linear-gradient(to bottom, var(--l31) 20%, var(--l32));
}
.lvl2 {
	background: linear-gradient(to bottom, var(--l21) 20%, var(--l22));
}
.lvl5, .lvl4, .lvl3, .lvl2 {
	background-clip: text;
	-webkit-background-clip: text;
	color: transparent !important;
	-webkit-text-fill-color: transparent !important;
}
#error {
	position: absolute;
	top: calc(5 * var(--u));
	left: 50%;
	transform: translateX(-50%);
	width: calc(100% - var(--chat-margin) * 2);
	height: calc(100% - (16 * var(--u)));
	box-sizing: border-box;
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);
	z-index: 20;
}
#error p {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: 80%;
	text-align: center;
	margin: 0;
	font-size: calc(4 * var(--u));
	color: var(--text);
	font-family: monospace;
}
#bottom {
	position: absolute;
	bottom: 0;
	left: 0;
	width: 100vw;
	height: calc(4 * var(--u));
	background: var(--bg);
}
#top, #bottom {
	z-index: 10;
	box-shadow: 0 0 calc(1 * var(--u)) calc(.5 * var(--u)) var(--bg);
}
.underlined {
	color: var(--grey);
	font-family: monospace;
	font-weight: 500;
	position: relative;
	transition: .2s;
	z-index: 2;
	text-decoration: none;
}
.underline {
	--widen: 0%;
	--fix: 0%;
	width: calc(100% + var(--widen));
	transform: translateX(calc(-100% + var(--fix)));
	height: 1px;
	background: var(--grey);
	position: absolute;
	bottom: 0;
	transition: .2s;
	z-index: -1;
}
.underlined:hover {
	color: var(--bg);
}
.underlined:hover .underline {
	height: 100%;
}
.underlined::selection {
	background: var(--text-s);
}
.template {
	display: none;
}
#alert {
	width: 100vw;
	height: 100vh;
	height: 100dvh;
	position: absolute;
	top: 0;
	left: 0;
	z-index: 100;
	background: var(--shadow);
}
#alert #alert-box {
	max-width: 80vw;
	width: calc(50 * var(--u));
	box-sizing: border-box;
	padding: calc(2 * var(--u));
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: calc(var(--br) * 2);
}
#alert #alert-box #alert-text {
	margin: 0;
	text-align: center;
	font-size: calc(3 * var(--u));
	font-weight: 500;
	font-family: Arial;
	color: var(--text);
}
#alert #alert-box #alert-options {
	display: flex;
	width: 100%;
	margin-top: calc(2 * var(--u));
	gap: calc(.5 * var(--u));

	align-items: center;
	justify-content: center;
}
#alert #alert-box #alert-options button {
	width: 100%;
	height: calc(4 * var(--u));

	--h: 0;
	--s: 0;
	--l: .4;
}
#alert #alert-box #alert-options button.action {
	--h: 250;
	--s: 1;
	--l: 1;
}
.mod[hidden] {
	display: none !important;
}
@media only screen and (min-aspect-ratio: 3/4) {
	:root {
		--u: 1.2vh;
	}
}
@media only screen and (min-aspect-ratio: 1/1) {

}
	</style>
</head>
<body>
	<div id="top">
		<button onclick="back()">
			<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M6 12H18M6 12L11 7M6 12L11 17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
		</button>
		<p class="logo"><b class="lvl5">Q</b>Chat</p>
	</div>

	<main id="main">
		<h1>Reset Password</h1>
		<h2>New Password: (Min 8)</h2>
		<input type="password" id="password" maxlength="64" oninput="formatPassword(this)">
		<h2>Confirm Password:</h2>
		<input type="password" id="password2" maxlength="64" oninput="formatPassword(this)">
		<button onclick="submit()">Change Password</button>
	</main>


	<div id="error" hidden>
		<p></p>
	</div>

	<dialog id="alert">
		<div id="alert-box">
			<p id="alert-text">Example</p>
			<div id="alert-options">
				<button class="btn" id="alert-cancel">CANCEL</button>
				<button class="btn action" id="alert-ok">OK</button>
			</div>
		</div>
	</dialog>

	<div id="bottom">
		<div id="info">
			<p id="domain">qchat.lol</p>
			<p>Made by <span><a class="underlined" href="https://qwkdev.github.io/" target="_blank" aria-label="label">qwk<span class="underline" style="--widen: 5%; --fix: 1%;"></span></a></span></p>
		</div>
	</div>

	<script>
		const params = new URLSearchParams(window.location.search);

		function back() {
			window.location.href = '/account/password/forgot' + (params.get('from') ? `?from=${params.get('from')}` : '');
		}
		function back2() {
			window.location.href = '/' + (params.get('from') ?? '');
		}

		if (!params.get('t') || !params.get('u')) back();

		const SERVER = 'https://qchat.pythonanywhere.com';
		// const SERVER = 'http://127.0.0.1:5000';

		const MIN_PASSWORD_LENGTH = 8;
		const MAX_PASSWORD_LENGTH = 64;

		function formatPassword(ele) {
			ele.classList = '';
			ele.value = ele.value.slice(0, MAX_PASSWORD_LENGTH);
		}

		const inputs = {
			password: document.getElementById('password'),
			password2: document.getElementById('password2'),
		};
		async function submit() {
			let exit = false;

			formatPassword(password);
			if (
				password.value.length < MIN_PASSWORD_LENGTH ||
				password.value.length > MAX_PASSWORD_LENGTH
			) {
				password.classList = 'invalid';
				exit = true;
			} else password.classList = '';

			if (password.value !== password2.value) {
				password2.classList = 'invalid';
				exit = true;
			} else password2.classList = '';

			if (exit) return;

			const resp = await fetch(`${SERVER}/account/password`, {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					user: params.get('u'),
					token: params.get('t'),
			 		new: password.value
				})
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success === true) showAlert('Password reset!', ok=back2);
					else showAlert(data.error, ok=back);
				})
				.catch(e => showError('Network Error:', e));
		}

		const errorWall = document.getElementById('error');
		let hideError;
		function showError(type=null, text=null) {
			if (text === null) {
				errorWall.hidden = true;
				clearTimeout(hideError);
			} else {
				errorWall.querySelector('p').innerHTML = '';
				errorWall.querySelector('p').append(
					document.createTextNode(type),
					document.createElement('br'),
					document.createTextNode(text)
				);
				if (errorWall.dataset.value != type + text || errorWall.hidden) {
					errorWall.dataset.value = type + text;
					errorWall.hidden = false;
				}
				hideError = setTimeout(() => showError(), 3000);
			}
		}

		const alertModal = document.getElementById('alert');
		const alertEle = {
			text: document.getElementById('alert-text'),
			options: document.getElementById('alert-options'),
			cancel: document.getElementById('alert-cancel'),
			ok: document.getElementById('alert-ok')
		}
		alertModal.addEventListener('click', e => {
			if (e.target === alertModal) alertModal.close();
		});
		function showAlert(text='Alert', ok=true, cancel=false) {
			alertEle.text.innerText = text;
			if (typeof ok === 'function') {
				alertEle.ok.onclick = function() {
					alertModal.close();
					ok();
				}
			} else alertEle.ok.onclick = () => alertModal.close();
			if (typeof cancel === 'function') {
				alertEle.cancel.onclick = function() {
					alertModal.close();
					cancel();
				}
			} else alertEle.cancel.onclick = () => alertModal.close();

			alertEle.options.hidden = ok === false && cancel === false;
			alertEle.ok.hidden = ok === false;
			alertEle.cancel.hidden = cancel === false;
			alertModal.showModal();
		}
	</script>
</body>
</html>
