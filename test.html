<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<style>
		body {
			background: #141415;
			margin: 0;
		}

		p {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);

			margin: 0;
			font-size: 5vh;
			text-align: center;
			font-family: Arial;

			width: 200px;

			color: transparent;
			background: linear-gradient(90deg, #30f, #0cf, #30f);
			background-size: 50% 100%;
			background-repeat: repeat-x;
			background-clip: text;

			animation: anim 2s linear infinite;
		}

		@keyframes anim {
			from {
				background-position: 0 0;
			}
			to {
				background-position: -100% 0;
			}
		}
	</style>
</head>
<body>
	<p>@qwk</p>
</body>
</html>
