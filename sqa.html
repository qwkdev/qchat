<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>QChat</title>

	<style>
:root {
	--u: 1.8vw;

	--c: #30f;
	--c2: #90f;

	--l41: #02d;
	--l42: #0cf;

	--l31: #050;
	--l32: #8f8;

	--l21: #f80;
	--l22: #ff0;

	--action: #205;
	--action2: #2a006c;
	--action3: #30a;

	--grey: #555;
	--grey-s: #5557;

	--bg: #000;
	--shadow: #0007;

	--text: #fff;
	--text-s: #fff5;
	--text2: #ccc;

	--fg: #141415;
	--fg2: #1f1f20;
	--fg3: #252526;

	--border: #333;
	--border2: #555;


	--border-width: calc(.12 * var(--u));
	--br: calc(1 * var(--u));
	--chat-margin: calc(1 * var(--u));
}
body {
	margin: 0;
	background: var(--bg);
	overflow: hidden;
}
* {
	scrollbar-width: none;
}
*::-webkit-scrollbar {
	display: none;
}
.btn {
	--btn-h: var(--h);
	--btn-s: var(--s);
	--btn-l: var(--l);
	--border: calc(.15 * var(--u));

	box-sizing: border-box;
	font-family: monospace;
	font-size: calc(2 * var(--u));
	color: var(--text);

	background: hsl(var(--btn-h), calc(83% * var(--btn-s)), calc(57% * var(--btn-l)));
	border: var(--border) solid hsl(var(--btn-h), calc(70% * var(--btn-s)), calc(48% * var(--btn-l)));
	border-radius: var(--br);
	box-shadow:
		0 calc(var(--border)/2) calc(var(--border)/2) var(--border) hsla(var(--btn-h), calc(72% * var(--btn-s)), calc(30% * var(--btn-l)), 0.2),
		inset 0 calc(-1 * var(--border)) var(--border) 0 hsl(var(--btn-h), calc(70% * var(--btn-s)), calc(48% * var(--btn-l))),
		inset 0 0 0 var(--border) hsl(var(--btn-h), calc(92% * var(--btn-s)), calc(62% * var(--btn-l)));

	transition: .2s;
}
.btn:hover {
	--btn-l: calc(var(--l) * 1.05);
}
.btn:focus {
	outline: none;
}
.btn::selection {
	background: var(--c);
}
#top {
	position: absolute;
	top: 0;
	left: 0;
	height: calc(5 * var(--u));
	display: flex;
	align-items: center;
	width: calc(100vw - var(--chat-margin) - calc(2 * var(--u)));
	margin: 0 calc(2 * var(--u)) 0 var(--chat-margin);
	gap: var(--chat-margin);
}
#top button {
	position: relative;
	background: transparent;
	border: none;
	width: calc(2.5 * var(--u));
	height: calc(2.5 * var(--u));
}
#top button:focus {
	outline: none;
}
#top button svg {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: calc(2.5 * var(--u));
	height: calc(2.5 * var(--u));
	stroke: var(--text);
}
#top .right {
	margin-left: auto;
	display: flex;
	align-items: center;
	gap: calc(1.2 * var(--chat-margin));
}
#top #channel {
	user-select: none;
	margin: 0;
	font-family: monospace;
	font-size: calc(2.5 * var(--u));
	color: var(--grey);
}
#top p.mod {
	user-select: none;
	margin: 0;
	font-family: monospace;
	color: var(--text);
	font-size: calc(2.5 * var(--u));
	font-weight: 700;
}
.logo {
	user-select: none;
	margin: 0;
	font-family: monospace;
	color: var(--text);
	font-size: calc(2.5 * var(--u));
}
.logo b {
	font-weight: 700;
}
.logo .version {
	color: var(--grey);
	font-size: calc(2 * var(--u));
}
#info {
	position: absolute;
	bottom: calc(1 * var(--u));
	width: calc(100vw - (1.2 * var(--u)) * 2);
	margin: 0 calc(1.2 * var(--u));
	display: flex;
	justify-content: space-between;
	align-items: center;
}
#info p {
	margin: 0;
	height: calc(2 * var(--u));
	font-family: monospace;
	font-size: calc(1.5 * var(--u));
	color: var(--grey);
}
#info p::selection {
	background: var(--grey-s);
}
#menu-wrapper {
	pointer-events: none;
	position: absolute;
	top: 0;
	left: -100vw;
	width: 100vw;
	height: 100vh;
	z-index: 50;
	display: grid;
	grid-template-columns: auto calc(5 * var(--u));
	transition: .5s;
}
#menu-wrapper #menu {
	width: 100%;
	height: 100%;
	background: var(--bg);
	box-shadow: 0 0 calc(5 * var(--u)) 0 var(--bg);
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: calc(5 * var(--u));
}
#menu-wrapper #menu .logo {
	font-size: calc(3 * var(--u));
	margin-top: calc(5 * var(--u));
	text-align: center;
}
#menu-wrapper #menu div {
	width: 100%;
	height: max-content;
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: calc(1 * var(--u));
}
#menu-wrapper #menu div[hidden] {
	display: none;
}
#menu-wrapper #menu input[type="text"], #menu-wrapper #menu input[type="password"], #menu-wrapper #menu button {
	width: 50%;
	height: calc(5 * var(--u));
	box-sizing: border-box;
	font-family: monospace;
	font-size: calc(2 * var(--u));
}
#menu-wrapper #menu input[type="text"]:focus, #menu-wrapper #menu input[type="password"]:focus, #menu-wrapper #menu button:focus {
	outline: none;
	border-color: var(--c);
}
#menu-wrapper #menu input[type="text"]::selection, #menu-wrapper #menu input[type="password"]::selection, #menu-wrapper #menu button::selection {
	background: var(--c);
}
#menu-wrapper #menu input[type="text"], #menu-wrapper #menu input[type="password"] {
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);
	font-family: monospace;
	font-size: calc(2 * var(--u));
	padding-left: calc(1.25 * var(--u));
	color: var(--text);
}
#menu-wrapper #menu button {
	background: var(--fg2);
	border: var(--border-width) solid var(--border2);
	border-radius: var(--br);
	color: var(--text);
}
#menu-wrapper #menu button:hover {
	background: var(--fg3);
}
#menu-wrapper #menu h1, #menu-wrapper #menu h2, #menu-wrapper #menu p:not(.logo) {
	width: 50%;
	box-sizing: border-box;
	font-family: monospace;
	font-size: calc(2 * var(--u));
	margin: 0;
	text-align: center;
	color: var(--text);
}
#menu-wrapper #menu h1::selection, #menu-wrapper #menu h2::selection, #menu-wrapper #menu p:not(.logo)::selection {
	background: var(--text-s);
}
#menu-wrapper #menu .linkwrap {
	width: 50%;
	box-sizing: border-box;
}
#menu-wrapper #menu a {
	width: min-content;
	box-sizing: border-box;
	font-family: monospace;
	font-size: calc(1.5 * var(--u));
	margin: 0;
	text-decoration: underline;
	cursor: pointer;
	color: var(--grey);
}
#menu-wrapper #menu a::selection {
	background: var(--grey-s);
}
#menu-wrapper #menu p:not(.logo) {
	font-size: calc(1.5 * var(--u));
}
#menu-wrapper #menu #logout-section h2 {
	margin: calc(1 * var(--u)) 0 calc(1.25 * var(--u)) 0;
}
#menu-wrapper #close-menu {
	position: relative;
	width: calc(5 * var(--u));
	height: calc(5 * var(--u));
	background: var(--bg);
	border: none;
}
#menu-wrapper #close-menu:focus {
	outline: none;
}
#menu-wrapper #close-menu svg {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: calc(2.5 * var(--u));
	height: calc(2.5 * var(--u));
	stroke: var(--text);
}
#menu-wrapper[data-active="1"] {
	left: 0;
	pointer-events: auto;
}
.lvl5 {
	background: linear-gradient(to bottom, var(--c) 20%, var(--c2));
}
.lvl4 {
	background: linear-gradient(to bottom, var(--l41) 20%, var(--l42));
}
.lvl3 {
	background: linear-gradient(to bottom, var(--l31) 20%, var(--l32));
}
.lvl2 {
	background: linear-gradient(to bottom, var(--l21) 20%, var(--l22));
}
.lvl5, .lvl4, .lvl3, .lvl2 {
	background-clip: text;
	-webkit-background-clip: text;
	color: transparent !important;
	-webkit-text-fill-color: transparent !important;
}
#chats {
	position: absolute;
	top: calc(5.5 * var(--u));
	left: 50%;
	transform: translateX(-50%);
	width: calc(100vw - var(--chat-margin) * 2);
	height: calc(100vh - (16.5 * var(--u)));
	height: calc(100dvh - (16.5 * var(--u)));
	padding-bottom: calc(1.25 * var(--u));
	box-sizing: border-box;
	overflow-x: hidden;
	overflow-y: scroll;
	display: flex;
	flex-direction: column;
	gap: calc(1.25 * var(--u));
}
#chats:focus {
	outline: var(--border-width) solid var(--c);
}
.chat {
	width: 100%;
	height: min-content;
	box-sizing: border-box;
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);
	padding: 0 calc(.7 * var(--u)) calc(.5 * var(--u)) calc(.7 * var(--u));
}
.chat div {
	display: flex;
	align-items: center;
	margin: 0;
	margin-top: calc(.6 * var(--u));
	gap: calc(.7 * var(--u));
}
.chat h1 {
	font-family: monospace;
	margin: 0;
	font-size: calc(1.8 * var(--u));
	font-weight: 700;
}
.chat h2 {
	font-family: monospace;
	margin: 0;
	color: var(--grey);
	font-size: calc(1.2 * var(--u));
	font-weight: 700;
}
.chat h2::selection {
	background: var(--grey-s);
}
.chat p {
	margin: 0;
	margin-top: calc(.7 * var(--u));
	font-family: Arial;
	font-size: calc(1.5 * var(--u));
	font-weight: 500;
	line-height: calc(2 * var(--u));
}
.chat h1, .chat p, .chat span {
	color: var(--text);
}
.chat h1::selection, .chat p::selection, .chat span::selection {
	background: var(--text-s);
}
.chat .mention {
	padding: var(--border-width);
	border: var(--border-width) solid var(--border);
	border-radius: calc(var(--br) / 2);
}
.chat .mod {
	margin: 0;
	margin-left: auto;
	gap: calc(.4 * var(--u));
	display: none;
}
.chat:hover .mod {
	display: flex;
}
.chat .mod[data-level="0"] .needsaccount {
	display: none;
}
.chat .mod[data-ip="0"] .needsip {
	display: none;
}
.chat .mod button {
	position: relative;
	background: transparent;
	border: none;
	width: calc(1.5 * var(--u));
	height: calc(1.5 * var(--u));
	padding: 0;
}
.chat .mod button:focus {
	outline: none;
}
.chat .mod button svg {
	position: absolute;
	top: 0;
	left: 0;
	width: calc(1.5 * var(--u));
	height: calc(1.5 * var(--u));
	stroke: var(--text);
	stroke-width: 2px;
}
.pending {
	border-color: var(--border2);
}
#new {
	display: flex;
	align-items: center;
	gap: calc(.4 * var(--u));
	padding-left: calc(.7 * var(--u));
	box-sizing: border-box;
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);
	position: absolute;
	bottom: calc(12.25 * var(--u));
	right: calc(1 * var(--u));
	box-shadow: 0 0 calc(1 * var(--u)) calc(-.5 * var(--u)) var(--bg);
	transition: .2s;
	z-index: 10;
}
#new p {
	color: var(--text);
	font-family: Arial;
	margin: calc(.5 * var(--u)) 0;
	font-size: calc(2 * var(--u));
}
#new svg {
	width: calc(2 * var(--u));
	height: calc(2 * var(--u));
}
#new svg path {
	stroke: var(--text);
}
#new:hover {
	background: var(--fg2);
	border: var(--border-width) solid var(--border2);
	transform: scale(1.03);
}
#new[hidden] {
	display: none;
}

#error {
	position: absolute;
	top: calc(5 * var(--u));
	left: 50%;
	transform: translateX(-50%);
	width: calc(100% - var(--chat-margin) * 2);
	height: calc(100% - (16 * var(--u)));
	box-sizing: border-box;
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);
	z-index: 20;
}
#error p {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: 80%;
	text-align: center;
	margin: 0;
	font-size: calc(4 * var(--u));
	color: var(--text);
	font-family: monospace;
}
#chat-wrapper:has(#error:not([hidden]))::before, #chat-wrapper:has(#error:not([hidden]))::after {
	height: calc(2 * var(--u));
	background: var(--bg);
}
#bottom {
	position: absolute;
	bottom: 0;
	left: 0;
	width: 100vw;
	height: calc(11 * var(--u));
	background: var(--bg);
}
#top, #bottom {
	z-index: 10;
	box-shadow: 0 0 calc(1 * var(--u)) calc(.5 * var(--u)) var(--bg);
}
#msg-input {
	position: absolute;
	bottom: calc(4 * var(--u));
	left: 50%;
	transform: translateX(-50%);
	width: calc(100vw - var(--chat-margin) * 2);
	height: calc(7 * var(--u));
	resize: none;
	border-radius: calc(var(--br) * 2);
	font-size: calc(2 * var(--u));
	padding: calc(2.2 * var(--u)) calc(2 * var(--u));
	box-sizing: border-box;
	color: var(--text2);
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	transition: .4s;
}
#msg-input:focus {
	outline: none;
	border-color: var(--c);
}
#msg-input::selection {
	background: var(--c);
	color: var(--text);
}
.underlined {
	color: var(--grey);
	font-family: monospace;
	font-weight: 500;
	position: relative;
	transition: .2s;
	z-index: 2;
	text-decoration: none;
}
.underline {
	--widen: 0%;
	--fix: 0%;
	width: calc(100% + var(--widen));
	transform: translateX(calc(-100% + var(--fix)));
	height: 1px;
	background: var(--grey);
	position: absolute;
	bottom: 0;
	transition: .2s;
	z-index: -1;
}
.underlined:hover {
	color: var(--bg);
}
.underlined:hover .underline {
	height: 100%;
}
.underlined::selection {
	background: var(--text-s);
}
.template {
	display: none;
}
#alert {
	width: 100vw;
	height: 100vh;
	height: 100dvh;
	position: absolute;
	top: 0;
	left: 0;
	z-index: 100;
	background: var(--shadow);
}
#alert #alert-box {
	max-width: 80vw;
	width: calc(50 * var(--u));
	box-sizing: border-box;
	padding: calc(2 * var(--u));
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: calc(var(--br) * 2);
}
#alert #alert-box #alert-text {
	margin: 0;
	text-align: center;
	font-size: calc(3 * var(--u));
	font-weight: 500;
	font-family: Arial;
	color: var(--text);
}
#alert #alert-box #alert-input {
	width: 100%;
	margin-top: calc(2 * var(--u));
	display: grid;
	grid-template-columns: auto auto;
	align-items: center;
	gap: calc(1 * var(--u));
}
#alert #alert-box #alert-input p {
	margin: 0;
	font-size: calc(2 * var(--u));
	font-weight: 500;
	font-family: Arial;
	color: #fff;
}
#alert #alert-box #alert-input[hidden] {
	display: none;
}
#alert #alert-box input {
	width: 100%;
	height: calc(5 * var(--u));
	box-sizing: border-box;
	padding-left: calc(1.25 * var(--u));
	
	background: var(--fg);
	border: var(--border-width) solid var(--border);
	border-radius: var(--br);

	font-family: monospace;
	font-size: calc(2 * var(--u));
	color: #fff;
}
#alert #alert-box input:focus {
	outline: none;
	border-color: var(--c);
}
#alert #alert-box input::selection {
	background: var(--c);
}
#alert #alert-box #alert-options {
	display: flex;
	width: 100%;
	margin-top: calc(2 * var(--u));
	gap: calc(.5 * var(--u));

	align-items: center;
	justify-content: center;
}
#alert #alert-box #alert-options button {
	width: 100%;
	height: calc(4 * var(--u));

	--h: 0;
	--s: 0;
	--l: .4;
}
#alert #alert-box #alert-options button.action {
	--h: 250;
	--s: 1;
	--l: 1;
}
.mod[hidden] {
	display: none !important;
}
@media only screen and (min-aspect-ratio: 3/4) {
	:root {
		--u: 1.2vh;
	}
}
@media only screen and (min-aspect-ratio: 1/1) {
	#menu-wrapper {
		left: -80vh;
		grid-template-columns: calc(80vh - (5 * var(--u))) calc(5 * var(--u));
	}
}
	</style>
</head>
<body>
	<div id="top">
		<button onclick="burger(1)">
			<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M4 6H20M4 12H20M4 18H20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
		</button>
		<p class="logo"><b class="lvl5">Q</b>Chat <span class="version">v1.7.0</span></p>
		<div class="right">
			<p class="mod" hidden></p>
			<p id="channel"></p>
		</div>
	</div>
	<div id="menu-wrapper" data-active="0">
		<div id="menu">
			<p class="logo"><b class="lvl5">Q</b>Chat</p>

			<div id="login-section">
				<p>Enter display name:</p>
				<input type="text" placeholder="Name" id="login-display" oninput="format(this)">
				
				<p>OR</p>

				<input type="text" placeholder="Username" id="login-user">
				<input type="password" placeholder="Password" id="login-password">
				<span class="linkwrap"><a onclick="forgotPassword()">Forgot Password</a></span>
				<button onclick="login()">Login</button>

				<p>OR</p>

				<button onclick="signup()">Sign Up</button>
			</div>
			<div id="logout-section" hidden>
				<p>Signed in as:</p>
				<h2 id="logged-in"></h2>
				<button onclick="logout()">Logout</button>
				<button onclick="editPassword()">Change Password</button>
			</div>
			<div id="mod-section" class="mod" hidden>
				<p>Mod tools:</p>
				<button onclick="modNuke()">Nuke Channel</button>
				<button onclick="modClearTimeouts()">Clear Timeouts</button>
			</div>
			<div id="settings-section">
				<p>Settings:</p>
				<button id="notif-toggle" onclick="toggleNotifications()">Notifications: Off</button>
			</div>
		</div>
		<button id="close-menu" onclick="burger(0)">
			<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M15 6L9 12L15 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
		</button>
	</div>
	
	<div id="chats">
		<div class="chat template">
			<div>
				<h1></h1>
				<h2></h2>
				<div class="mod" data-level="" data-ip="" hidden>
					<button class="needsaccount mod2" onclick="modBan(this)" hidden>
						<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M18.364 18.364C19.9926 16.7353 21 14.4853 21 12C21 7.02944 16.9706 3 12 3C9.51472 3 7.26472 4.00736 5.63604 5.63604M18.364 18.364C16.7353 19.9926 14.4853 21 12 21C7.02944 21 3 16.9706 3 12C3 9.51472 4.00736 7.26472 5.63604 5.63604M18.364 18.364L5.63604 5.63604" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
					</button>
					<button class="needsaccount" onclick="modTimeout(this, false)">
						<svg style="transform: translateY(-3%)" viewbox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M12 14V11M12 6C7.85786 6 4.5 9.35786 4.5 13.5C4.5 17.6421 7.85786 21 12 21C16.1421 21 19.5 17.6421 19.5 13.5C19.5 11.5561 18.7605 9.78494 17.5474 8.4525M12 6C14.1982 6 16.1756 6.94572 17.5474 8.4525M12 6V3M19.5 6.5L17.5474 8.4525M12 3H9M12 3H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
					</button>
					<button class="needsip" onclick="modTimeout(this, true)">

					</button>
					<button onclick="modDelete(this)">
						<svg style="transform: translateX(-3%)" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M6 6L18 18M18 6L6 18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>

	<button id="new" onclick="scrollBottom()" hidden>
		<p>New</p>
		<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g><path d="M12 6V18M12 18L7 13M12 18L17 13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
	</button>

	<div id="error" hidden>
		<p></p>
	</div>

	<dialog id="alert">
		<div id="alert-box">
			<p id="alert-text">Example</p>
			<div id="alert-input" hidden></div>
			<div id="alert-options">
				<button class="btn" id="alert-cancel">CANCEL</button>
				<button class="btn action" id="alert-ok">OK</button>
			</div>
		</div>
	</dialog>

	<div id="bottom">
		<textarea id="msg-input" placeholder="Loading..."></textarea>

		<div id="info">
			<p id="domain">qchat.lol</p>
			<p>Made by <span><a class="underlined" href="https://qwkdev.github.io/" target="_blank" aria-label="label">qwk<span class="underline" style="--widen: 5%; --fix: 1%;"></span></a></span></p>
		</div>
	</div>

	<script>
		const MAX_NAME_LENGTH = 16;
		function safeText(text) {
			return text.replace(/[^a-zA-Z0-9_-]/g, '').slice(0, MAX_NAME_LENGTH);
		}

		const CHANNEL = safeText(window.location.pathname.slice(1)) || 'main';
		// const SERVER = 'https://qchat.pythonanywhere.com';
		const SERVER = 'http://127.0.0.1:5000';

		let session = {
			auth: null,
			user: null,
			level: 0
		}

		function saveSession() {
			if (session.auth) localStorage.setItem('token', session.auth);
			else localStorage.removeItem('token');

			if (session.user) localStorage.setItem('user', session.user);
			else localStorage.removeItem('user');
		}

		const loginSection = document.getElementById('login-section');
		const menuEle = {
			display: document.getElementById('login-display'),
			user: document.getElementById('login-user'),
			password: document.getElementById('login-password'),
			loggedin: document.getElementById('logged-in')
		}
		const logoutSection = document.getElementById('logout-section');

		function format(e) {
			e.value = safeText(e.value);
		}

		const modLabel = document.querySelector('#top .right .mod');
		function fixMenuSections() {
			if (!session.user) {
				loginSection.hidden = false;
				logoutSection.hidden = true;

				menuEle.user.value = '';
				menuEle.password.value = '';
			} else {
				loginSection.hidden = true;
				logoutSection.hidden = false;

				menuEle.loggedin.innerText = parseUser(session.user, session.level);
				menuEle.loggedin.className = `lvl${Number(session.level) || 0}`;
			}

			const modHidden = !session.user || session.level < 3;
			const mod2Hidden = !session.user || session.level < 4;

			if (!modHidden) {
				modLabel.classList = `mod lvl${session.level}`;
				if (session.level === 3) modLabel.innerText = 'MOD';
				if (session.level === 4) modLabel.innerText = 'ADMIN';
				if (session.level === 5) modLabel.innerText = 'DEV';
			}

			document.querySelectorAll('.mod').forEach(e => e.hidden = modHidden);
			document.querySelectorAll('.mod2').forEach(e => e.hidden = mod2Hidden);
			
		}
		
		function editPassword() {
			window.location.href = `/account/password/edit?from=${CHANNEL}`;
		}
		function forgotPassword() {
			window.location.href = `/account/password/forgot?from=${CHANNEL}`;
		}
		function signup() {
			window.location.href = `/signup?from=${CHANNEL}`;
		}

		function loginUser(data) {
			session.auth = data.auth || null;
			session.user = data.user || null;
			session.level = data.level || 0;
			saveSession();
			
			menuEle.password.value = '';
			fixMenuSections();
			showError();
			resetChat();
		}

		async function login() {
			if (!menuEle.user.value || !menuEle.password.value) return;

			await fetch(`${SERVER}/login`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					user: menuEle.user.value.includes('@') ? menuEle.user.value : '@' + menuEle.user.value,
					password: menuEle.password.value
				})
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success === true) loginUser(data)
					else showError('Client Error:', data.error);
				})
				.catch(e => showError('Network Error:', e));
		}
		async function logout() {
			await fetch(`${SERVER}/logout`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					auth: session.auth,
					user: getUser()
				})
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success !== true) showError('Client Error:', data.error);

					session.user = null;
					session.level = 0;
					saveSession();
					fixMenuSections();
				})
				.catch(e => showError('Network Error:', e));
		}

		function parseChannel(channel) {
			if (
				!channel.startsWith('~') &&
				!channel.startsWith('^')
			) {
				return `#${channel}`;
			} else return channel;
		}

		const channelName = parseChannel(CHANNEL);
		document.getElementById('channel').innerText = channelName;
		document.getElementById('domain').innerText += '/' + CHANNEL;

		const msgInput = document.getElementById('msg-input');
		msgInput.placeholder = `Message ${channelName}`;

		const errorWall = document.getElementById('error');

		const chat = document.getElementById('chats');
		const chatTemplate = document.querySelector('.chat.template');

		function scrollBottom(smooth=true) {
			chat.scrollTo({ top: chat.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
		}

		async function resetChat() {
			chat.querySelectorAll('.chat:not(.template)').forEach(e => e.remove());
			await sync(false);
			setTimeout(() => scrollBottom(false), 100);
		}

		function parseEpoch(epoch) {
			if (epoch === 0) return '';

			const date = new Date( epoch*1000 );
			const now = new Date();
			const isToday =
				date.getDate() === now.getDate() &&
				date.getMonth() === now.getMonth() &&
				date.getFullYear() === now.getFullYear();

			const hours = String(date.getHours()).padStart(2, '0');
			const minutes = String(date.getMinutes()).padStart(2, '0');

			if (isToday) {
				return `${hours}:${minutes}`;
			} else {
				const day = String(date.getDate()).padStart(2, '0');
				const month = String(date.getMonth() + 1).padStart(2, '0');
				return `${hours}:${minutes} ${day}/${month}`;
			}
		}

		function parseUser(user, level) {
			if (level === 0) return user;
			// else if (level === 4) return `[${user}]`;
			else return `@${user}`;

			// switch (level) {
			// 	case 0: return user;
			// 	case 1: return `@${user}`;
			// 	case 2: return `;${user}`;
			// 	case 3: return `^${user}`;
			// 	case 4: return `[${user}]`;
			// 	default: return user;
			// }
		}
		function getUser(force=false) {
			const resp = session.user ? parseUser(session.user, session.level) : (menuEle.display.value || '')

			if (force && !resp) {
				burger(1);
				menuEle.display.focus();
				showAlert('Please enter a display name to chat');
			} else return resp;
		}

		function checkExists(msgId) {
			return document.getElementById(msgId) ? true : false;
		}
		function getLatest() {
			return Array.from(chat.querySelectorAll('.chat:not(.template)'))
				.map(e => parseInt(e.id)).at(-1) || -1;
		}

		/////

		function modBan(btn) {
			const msg = parseInt(btn.parentElement.parentElement.parentElement.id);
			if (Number.isNaN(msg)) return;

			showAlert(`Confirm BAN`, () => {
				sendRequest(`/mod/ban/${CHANNEL}`, { msg }, () => showAlert('Banned'));
			}, true);
		}
		function modTimeout(btn, ip) {
			const msg = parseInt(btn.parentElement.parentElement.parentElement.id);
			if (Number.isNaN(msg)) return;

			showAlert(`Confirm ${ip ? 'IP' : 'Account'} timeout`, () => {
				let duration = parseInt(prompt('Enter duration (in minutes):'));
				if (duration !== null && duration >= 0) duration = duration * 60;
				else {
					showAlert('Invalid Duration');
					return;
				}

				sendRequest(`/mod/timeout/${CHANNEL}`, { msg, duration, ip }, () => showAlert('Timed Out'));
			}, true);
		}
		function modDelete(btn) {
			const msg = parseInt(btn.parentElement.parentElement.parentElement.id);
			if (Number.isNaN(msg)) return;

			showAlert('Confirm deletion', () => {
				sendRequest(`/mod/delete/${CHANNEL}`, { msg }, sync);
			}, true);
		}
		function modNuke() {
			showAlert('Confirm nuke', () => {
				sendRequest(`/mod/nuke/${CHANNEL}`, null, resetChat);
			}, true);
		}
		function modClearTimeouts() {
			showAlert('Confirm removing ALL (IP) timeouts', () => {
				sendRequest('/mod/cleartimeouts');
			}, true);
		}

		async function sendRequest(path, body=null, after=null) {
			const user = getUser(true);
			const resp = await fetch(`${SERVER}${path}`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({ auth: session.auth, user, ...(body ?? {}) })
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success !== true) {
						showError('Client Error:', data.error);
					} else {
						if (after) after();
					}

					return data;
				})
				.catch(e => showError('Network Error:', e));

			return resp ?? {'success': false};
		}

		/////

		let notifications = false;

		const notifToggle = document.getElementById('notif-toggle');
		function setSettings() {
			notifToggle.innerText = 'Notifications: ' + (notifications ? 'On' : 'Off');
		}

		function loadSettings() {
			if (localStorage.getItem('notifs') !== null) {
				notifications = localStorage.getItem('notifs') === 'true' ? true : false;
			}
			
			setSettings();
		}
		function saveSettings() {
			localStorage.setItem('notifs', notifications);
			setSettings();
		}

		loadSettings();


		function sameOriginIframe() {
			try {
				return window.top.location.origin === window.location.origin;
			} catch {
				return false;
			}
		}
		function canSendNotifs() {
			return window.Notification && (
				window === window.top ||
				sameOriginIframe()
			);
		}
		if (!canSendNotifs()) {
			notifToggle.hidden = true;
			notifications = false;
		}

		async function toggleNotifications() {
			if (!canSendNotifs()) {
				alert('Your context does not support notifications.');
				return;
			}

			if (!notifications) {
				const permission = await Notification.requestPermission();
				notifications = permission ? true : false;
			} else {
				notifications = !notifications;
			}
			saveSettings();
		}




		let notifs = [];
		function pushNotif(title, body) {
			if (
				notifications &&
				window.Notification &&
				Notification.permission !== 'denied'
			) {
				if (document.visibilityState !== 'visible') {
					const n = new Notification(`qChat | ${title}`, { body });
					notifs.push(n);
				}
			} else {
				notifications = false;
				saveSettings();
			}
		}
		function clearNotifs() {
			notifs.forEach(n => n.close());
			notifs = [];
		}
		document.addEventListener('visibilitychange', () => {
			if (document.visibilityState === 'visible') clearNotifs();
		});

		/////

		const newChatsBtn = document.getElementById('new');
		const newChatsText = newChatsBtn.querySelector('p');
		let newChats = 0;
		const observer = new IntersectionObserver(t => {
			t.forEach(e => {
				if (e.isIntersecting) {
					newChats--;
					if (newChats < 0) newChats = 0;
					newChatsBtn.hidden = newChats == 0;
					observer.unobserve(e.target);
				}
			});
		}, {
			root: null,
			threshold: 0.5
		});

		function partsToString(parts) {
			let resp = '';
			parts.forEach(part => {
				if (typeof part === 'string') {
					resp += part;
				} else {
					if (part.type === 'newline') {
						resp += '\n';
					} else if (part.type === 'mention') {
						resp += part.value;
					}
				}
			});

			return resp;
		}

		const bottomError = 10; // px
		function addChat(notif, atBottom, msgId, epoch, level, user, parts, ip=null, init=false, pending=false) {
			if (!pending && checkExists(msgId)) return;

			const newChat = chatTemplate.cloneNode(true);
			newChat.classList.remove('template');

			const newUsername = newChat.querySelector('h1');
			const newDate = newChat.querySelector('h2');
			if (!user) {
				if (epoch === 0) newChat.querySelector('div').remove();
				else {
					newUsername.remove();
					newDate.innerText = parseEpoch(epoch);
				}
			} else {
				newUsername.innerText = parseUser(user, level);
				newUsername.classList = `lvl${level}`;
				newDate.innerText = parseEpoch(epoch);

				const newModActions = newChat.querySelector('div.mod');
				newModActions.dataset.level = level;
				newModActions.dataset.ip = ip ? 1 : 0;
			}
			if (ip) newDate.innerText += ` | ${ip}`;

			const text = newChat.querySelector('p');
			parts.forEach(part => {
				if (typeof part === 'string') {
					text.append(document.createTextNode(part));
				} else {
					if (part.type === 'newline') {
						text.append(document.createElement('br'));
					} else if (part.type === 'mention') {
						const newMention = document.createElement('span');
						newMention.classList = `mention lvl${part.level}`;
						newMention.innerText = part.value;
						text.append(newMention);
					}
				}
			});

			newChat.id = msgId;

			if (pending) {
				newChat.classList.add('pending');
			}
			if (init) {
				chat.appendChild(newChat);
			} else {
				for (const e of Array.from(chat.querySelectorAll('.chat')).reverse()) {
					const eId = parseInt(e.id);
					if (!eId || msgId > eId) {
						chat.insertBefore(newChat, e.nextSibling);

						if (notifications && notif) {
							pushNotif(
								parseUser(user, level),
								partsToString(parts)
							);
						}

						if (scrollPrompt && !atBottom) {
							newChats++;
							newChatsBtn.hidden = false;
							newChatsText.innerText = `${newChats} New`;
							observer.observe(newChat);
						}
						break;
					}
				}

				if (!scrollPrompt && atBottom) scrollBottom();
			}
		}

		function addPending(message, level, user) {
			const parts = message.split('\n').flatMap((e, i, a) => i < a.length - 1 ? [e, {'type': 'newline'}] : [e]);
			addChat(false, true, 0, new Date().getTime() / 1000, level, user.startsWith('@') ? user.slice(1) : user, parts, null, true, true);
			scrollBottom();
		}
		function removePending() {
			Array.from(chat.querySelectorAll('.chat.pending')).forEach(e => e.remove());
		}

		let hideError;
		function showError(type=null, text=null) {
			if (text === null) {
				errorWall.hidden = true;
				clearTimeout(hideError);
			} else {
				errorWall.querySelector('p').innerHTML = '';
				errorWall.querySelector('p').append(
					document.createTextNode(type),
					document.createElement('br'),
					document.createTextNode(text)
				);
				if (errorWall.dataset.value != type + text || errorWall.hidden) {
					errorWall.dataset.value = type + text;
					errorWall.hidden = false;
					burger(0);
				}
				hideError = setTimeout(() => showError(), 3000);
			}
		}

		function extractForm(parent) {
			let resp = {};
			parent.querySelectorAll('input').forEach(e => {
				resp[e.dataset.name] = e.value;
			});

			return resp;
		}

		const alertModal = document.getElementById('alert');
		const alertEle = {
			text: document.getElementById('alert-text'),
			options: document.getElementById('alert-options'),
			cancel: document.getElementById('alert-cancel'),
			ok: document.getElementById('alert-ok'),
			input: document.getElementById('alert-input')
		}
		alertModal.addEventListener('click', e => {
			if (e.target === alertModal) alertModal.close();
		});
		function showAlert(html='Alert', ok=true, cancel=false, form=null) {
			alertEle.text.innerHTML = html;
			if (typeof ok === 'function') {
				alertEle.ok.onclick = function() {
					alertModal.close();
					if (alertEle.input.hidden) ok();
					else ok(extractForm(alertEle.input));
				}
			} else alertEle.ok.onclick = () => alertModal.close();
			if (typeof cancel === 'function') {
				alertEle.cancel.onclick = function() {
					alertModal.close();
					cancel();
				}
			} else alertEle.cancel.onclick = () => alertModal.close();

			alertEle.options.hidden = ok === false && cancel === false;
			alertEle.ok.hidden = ok === false;
			alertEle.cancel.hidden = cancel === false;

			alertEle.input.innerHTML = '';
			alertEle.input.hidden = !form;

			if (form) {
				Object.entries(form).forEach(([k, v]) => {
					const newLabel = document.createElement('p');
					newLabel.innerText = v;

					const newInput = document.createElement('input');
					newInput.type = 'text';
					newInput.dataset.name = k;

					alertEle.input.appendChild(newLabel);
					alertEle.input.appendChild(newInput);
				})
			}

			alertModal.showModal();
		}

		const menuWrapper = document.getElementById('menu-wrapper');
		function burger(value) {
			menuWrapper.dataset.active = value;
			if (value == 1) menuWrapper.querySelector('button, input, textarea')?.focus();
		}
		menuWrapper.addEventListener('click', e => {
			if (e.target === menuWrapper) burger(0);
		})
		msgInput.addEventListener('keydown', e => {
			if (e.key === 'Enter') {
				if (e.shiftKey) return;
				else {
					e.preventDefault();
					addPending(msgInput.value, session.level, getUser(true));
					send(msgInput.value);
					msgInput.value = '';
				}
			}
		});
		msgInput.addEventListener('focus', e => {
			getUser(true);
		});
		let keysDown = new Set();
		document.addEventListener('keydown', e => {
			keysDown.add(e.key);
			if (e.key === 'Escape') burger(menuWrapper.dataset.active == 0 ? 1 : 0)
			if (menuWrapper.dataset.active == 0) {
				if (
					!['Tab', 'Control', 'Shift', 'CapsLock', 'Alt'].includes(e.key) &&
					e.target !== msgInput &&
					!keysDown.has('Control')
				) {
					if (e.key === 'Enter' || e.key === 'Space') {
						e.preventDefault();	
					}
					msgInput.focus();
				}
			}
		});
		document.addEventListener('keyup', e => keysDown.delete(e.key));

		menuEle.user.addEventListener('keydown', e => {
			if (e.key === 'Enter') {
				if (e.shiftKey) return;
				else {
					e.preventDefault();
					menuEle.password.focus();
				}
			}
		});
		menuEle.password.addEventListener('keydown', e => {
			if (e.key === 'Enter') {
				if (e.shiftKey) return;
				else {
					e.preventDefault();
					login();
				}
			}
		});

		let syncedEvents = new Set();

		function syncEvents(events) {
			// console.log(events, events.length, events[0]?.[1], syncedEvents, JSON.stringify(event));
			// if (events.length === 1 && events[0][1] === 'reset' && !syncedEvents.has(JSON.stringify(event))) {
			// 	syncedEvents.clear();
			// 	syncedEvents.add(JSON.stringify(event));
			// 	resetChat();
			// 	return;
			// }

			events.forEach(e => syncEvent(e));
		}

		function syncEvent(event) {
			if (syncedEvents.has(JSON.stringify(event))) return;

			if (event[1] === 'delete') {
				document.getElementById(event[2])?.remove();
			}
			syncedEvents.add(JSON.stringify(event));
		}

		async function sync(notif=true) {
			const user = getUser(false);
			const latest = getLatest();
			await fetch(`${SERVER}/get/${CHANNEL}?after=${latest}`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({ auth: session.auth, user })
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success === true) {
						const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < bottomError;
						data.chat.forEach(c => addChat(
							notif,
							atBottom,
							...c
						));
						removePending();

						syncEvents(data.events);
					} else showError('Client Error:', data.error);
				})
				.catch(e => showError('Network Error:', e));
		}

		async function send(msg) {
			const user = getUser(true);
			await fetch(`${SERVER}/msg/${CHANNEL}`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({ auth: session.auth, msg, user })
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success !== true) {
						showError('Client Error:', data.error);
					}
				})
				.catch(e => showError('Network Error:', e));
		}

		let syncInterval;
		function startSync() {
			if (!syncInterval) {
				sync();
				syncInterval = setInterval(sync, 7000);
			}
		}
		function stopSync() {
			if (syncInterval) {
				clearInterval(syncInterval);
				syncInterval = null;
			}
		}
		
		let scrollPrompt = false;
		async function init() {
			scrollPrompt = false;
			sync(false).then(() => {
				scrollBottom(false);
				setTimeout(() => scrollBottom(false), 100);
				setTimeout(() => scrollBottom(false), 200);
				scrollPrompt = true;
			});
			startSync();
		}

		if (localStorage.getItem('user') && localStorage.getItem('token')) {
			const tempUser = localStorage.getItem('user');
			const tempAuth = localStorage.getItem('token');
			fetch(`${SERVER}/check`, {
				method: 'POST',
				// credentials: 'include',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({
					auth: tempAuth,
					user: '@' + tempUser
				})
			})
				.then(resp => resp.json())
				.then(data => {
					if (data.success === true) loginUser(data)
					else showError('Client Error:', data.error);
				})
				.catch(e => showError('Network Error:', e))
				.finally(() => init());
		} else init();

		window.addEventListener('message', e => {
			if (e.data && e.data.type === 'control-sync') {
				if (e.data.sync) startSync();
				else stopSync();
			}
		});
	</script>
</body>
</html>
